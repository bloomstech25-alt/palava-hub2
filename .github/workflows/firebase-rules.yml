name: Deploy Firebase Rules
on:
  push:
    branches:
      - main
    paths:
      - firestore.rules
      - firestore.indexes.json
      - storage.rules
      - firebase.json
      - .github/workflows/firebase-rules.yml
  workflow_dispatch:
jobs:
  deploy_rules:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Write service account to disk
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"
      - name: Deploy Firestore rules + indexes and Storage rules
        run: firebase deploy --only firestore:rules,firestore:indexes,storage --project palava-hub --non-interactive
